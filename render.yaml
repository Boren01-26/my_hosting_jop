services:
  - type: web
    name: job-portal
    runtime: python
    pythonVersion: 3.14
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn job_portal_django.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "django-insecure-render-deployment-key"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: neon
          property: connectionString
